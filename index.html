<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Care</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f766e">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Care">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
</head>

<body>
  <h1>Care</h1>
  <p>Bienvenue sur l’application Care.</p>

  <button id="notificationBtn">
    Activer les notifications
  </button>

  <p id="token"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-messaging.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOlAIN2F0KZqNuvoh5ohlT66OdOhzz7P8",
    authDomain: "care-2cbc1.firebaseapp.com",
    projectId: "care-2cbc1",
    storageBucket: "care-2cbc1.firebasestorage.app",
    messagingSenderId: "102325538795",
    appId: "1:102325538795:web:51648a53db1cc0f1d093ae",
    measurementId: "G-BGRDNMT659"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);
  const db = getFirestore(app);

  document.getElementById("notificationBtn").addEventListener("click", async () => {
    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Notifications refusées");
      return;
    }

    const registration = await navigator.serviceWorker.register("./firebase-messaging-sw.js");

    const token = await getToken(messaging, {
      vapidKey: "BNVaU-yEJWK5gp6p1km6mZMc95l769Vji6mZMc95l769Vji6j4GS7tVId7Q6ZCmYCGS0_brkDpgBI9hc4GIrO4pkgQIK_-ySgFAGg",
      serviceWorkerRegistration: registration
    });

    await setDoc(doc(db, "tokens", token), {
      token: token,
      createdAt: serverTimestamp(),
      platform: navigator.userAgent
    });

    alert("Notifications activées !");
  });
</script>
</body>
</html>
