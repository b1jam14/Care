<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Care</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f766e">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Care">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <link rel="stylesheet" href="./styles/main.css"/>
  <script src="https://unpkg.com/parse@6.1.1/dist/parse.js"></script>
</head>

<body>
  <main class="app-container">
    <header class="app-header">
      <h1 class="app-title">Care</h1>
      <button id="notificationBtn" class="btn" style="display: none;">Activer notifications</button>
    </header>
 
    <section class="progress-section" aria-label="Progression dans le temps">
      <div 
        class="progress-track"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        id="progress-bar-wrapper"
      >
      <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>
 
    <section class="table-section">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th scope="col">🏃 Sport</th>
              <th scope="col">📚 Study</th>
              <th scope="col">🥗 Food</th>
              <th scope="col">❤️ Health</th>
            </tr>
          </thead>
          <tbody id="care-tbody"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
